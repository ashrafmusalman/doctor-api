apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital-api

  template:
    metadata:
      labels:
        app: hospital-api

      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "hospital-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/hospital"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/hospital" -}}
          DB_PASSWORD={{ .Data.data.DB_PASSWORD }}
          SECRET_KEY={{ .Data.data.SECRET_KEY }}
          {{- end }}

    spec:
      serviceAccountName: hospital-sa   # IMPORTANT

      containers:
        - name: hospital-api
          image: ashrafkhan0277/hospital-api:1.0

          ports:
            - containerPort: 8000

          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"