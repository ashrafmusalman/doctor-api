apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hospital-api

  template:
    metadata:
      labels:
        app: hospital-api

      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "hospital-role"
        vault.hashicorp.com/vault-addr: "http://10.0.1.234:8200"

        vault.hashicorp.com/agent-inject-secret-config: "secret/data/hospital"

        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/hospital" -}}
          DB_PASSWORD={{ .Data.data.DB_PASSWORD }}
          SECRET_KEY={{ .Data.data.SECRET_KEY }}
          {{- end }}

    spec:
      serviceAccountName: vault-auth-sa

      containers:
        - name: hospital-api
          image: ashrafkhan0277/hospital-api:1.0

          ports:
            - containerPort: 8000

          #  Non-sensitive from ConfigMap
          envFrom:
            - configMapRef:
                name: hospital-config

          #  IMPORTANT: Load Vault secrets before app starts
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Loading Vault secrets..."
              source /vault/secrets/config
              echo "Starting app..."
              python app.py

          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"